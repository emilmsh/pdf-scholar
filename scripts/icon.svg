<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.35" y2="1">
      <stop offset="0" stop-color="#0e3a3f"/>
      <stop offset="1" stop-color="#18696a"/>
    </linearGradient>
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#faf4e8"/>
      <stop offset="1" stop-color="#ece0c8"/>
    </linearGradient>
    <linearGradient id="roll" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f2e6cd"/>
      <stop offset="1" stop-color="#d6c096"/>
    </linearGradient>
    <filter id="softShadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity="0.30"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- scroll: rolled top & bottom, reading highlight over one line -->
  <g filter="url(#softShadow)">
    <rect x="154" y="134" width="204" height="244" rx="11" fill="url(#paper)"/>
    <g fill="#a99c82" opacity="0.85">
      <rect x="184" y="181" width="140" height="13" rx="6.5"/>
      <rect x="184" y="300" width="142" height="13" rx="6.5"/>
      <rect x="184" y="332" width="100" height="13" rx="6.5"/>
    </g>
    <rect x="178" y="217" width="156" height="28" rx="8" fill="#f4c56a" opacity="0.55"/>
    <rect x="184" y="224" width="140" height="13" rx="6.5" fill="#a99c82" opacity="0.9"/>
    <rect x="131" y="107" width="250" height="54" rx="27" fill="url(#roll)"/>
    <ellipse cx="148" cy="134" rx="8" ry="18" fill="#b89f6f" opacity="0.55"/>
    <ellipse cx="364" cy="134" rx="8" ry="18" fill="#b89f6f" opacity="0.55"/>
    <rect x="131" y="351" width="250" height="54" rx="27" fill="url(#roll)"/>
    <ellipse cx="148" cy="378" rx="8" ry="18" fill="#b89f6f" opacity="0.55"/>
    <ellipse cx="364" cy="378" rx="8" ry="18" fill="#b89f6f" opacity="0.55"/>
  </g>
</svg>
