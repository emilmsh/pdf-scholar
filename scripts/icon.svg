<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3a5ba8"/>
      <stop offset="1" stop-color="#22386e"/>
    </linearGradient>
    <linearGradient id="ribbon" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5b8df5"/>
      <stop offset="1" stop-color="#2f66d6"/>
    </linearGradient>
    <filter id="pageShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000" flood-opacity="0.28"/>
    </filter>
    <filter id="ribbonShadow" x="-40%" y="-20%" width="180%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="6" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="104" fill="url(#bg)"/>
  <!-- page with folded corner -->
  <g filter="url(#pageShadow)">
    <path d="M136 122 a18 18 0 0 1 18 -18 h170 l52 52 v236 a18 18 0 0 1 -18 18 h-204 a18 18 0 0 1 -18 -18 z" fill="#fbfbfd"/>
    <path d="M324 104 l52 52 h-40 a12 12 0 0 1 -12 -12 z" fill="#dfe3ec"/>
  </g>
  <!-- text lines -->
  <g fill="#b9c0cf">
    <rect x="168" y="182" width="176" height="13" rx="6.5"/>
    <rect x="168" y="216" width="176" height="13" rx="6.5"/>
    <rect x="168" y="284" width="176" height="13" rx="6.5"/>
    <rect x="168" y="318" width="122" height="13" rx="6.5"/>
  </g>
  <!-- highlighted line -->
  <rect x="160" y="242" width="192" height="27" rx="9" fill="#ffd54a"/>
  <rect x="168" y="250" width="176" height="13" rx="6.5" fill="#8a7430" opacity="0.55"/>
  <!-- reading ribbon -->
  <g filter="url(#ribbonShadow)">
    <path d="M296 104 h44 v128 l-22 -17 l-22 17 z" fill="url(#ribbon)"/>
  </g>
</svg>
