    <path d="M -3,-42 C -14,-47 -22,-60 -26,-78 L -18,-74 C -28,-96 -32,-128 -28,-160 C -26,-178 -20,-198 -10,-216 C -18,-186 -20,-150 -14,-118 C -10,-90 -2,-64 8,-50 C 4,-44 0,-41 -3,-42 Z"
          fill="#b9b19c" opacity="0.5"/>
    <path d="M 30,-252 C 48,-230 58,-204 60,-176 C 46,-186 32,-204 24,-226 C 26,-236 28,-246 30,-252 Z"
