      <path d="M 6,-98 C 20,-108 34,-122 44,-138"/>
      <path d="M 2,-136 C 16,-146 30,-160 40,-176"/>
      <path d="M 0,-174 C 12,-184 24,-198 34,-212"/>
    </g>
