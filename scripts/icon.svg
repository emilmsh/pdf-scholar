<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4f8ceb"/>
      <stop offset="1" stop-color="#2c60c6"/>
    </linearGradient>
    <linearGradient id="parch" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#faf3e0"/>
      <stop offset="1" stop-color="#e9dcba"/>
    </linearGradient>
    <linearGradient id="roll" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fdf8ea"/>
      <stop offset="0.5" stop-color="#f1e5c4"/>
      <stop offset="1" stop-color="#c9b586"/>
    </linearGradient>
    <linearGradient id="vane" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fefdf9"/>
      <stop offset="1" stop-color="#ddd8ca"/>
    </linearGradient>
    <linearGradient id="horn" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ecd39a"/>
      <stop offset="1" stop-color="#c9a35e"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="104" fill="url(#bg)"/>
  <!-- parchment: rolled top edge, gently waved bottom -->
  <g filter="url(#softShadow)">
    <path d="M156 126 h200 v276 q -50 14 -100 0 q -50 -14 -100 0 z" fill="url(#parch)"/>
    <path d="M156 126 h200 v14 h-200 z" fill="#8f7a4e" opacity="0.22"/>
    <g fill="#b8a273">
      <rect x="180" y="186" width="126" height="13" rx="6.5"/>
      <rect x="180" y="218" width="152" height="13" rx="6.5"/>
      <rect x="180" y="282" width="152" height="13" rx="6.5"/>
      <rect x="180" y="314" width="106" height="13" rx="6.5"/>
    </g>
    <rect x="173" y="243" width="146" height="27" rx="9" fill="#ffd54a"/>
    <rect x="180" y="250" width="132" height="13" rx="6.5" fill="#8a7430" opacity="0.55"/>
    <rect x="138" y="88" width="236" height="40" rx="20" fill="url(#roll)"/>
    <circle cx="158" cy="108" r="11" fill="#e3d3a6"/><circle cx="158" cy="108" r="4.5" fill="#a98f5c"/>
    <circle cx="354" cy="108" r="11" fill="#e3d3a6"/><circle cx="354" cy="108" r="4.5" fill="#a98f5c"/>
  </g>
