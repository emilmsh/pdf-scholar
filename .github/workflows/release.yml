# Tag v* → build every desktop target + the extension zips, and create a
# DRAFT GitHub Release holding all assets. The draft's notes lead with a
# per-platform download table; it is reviewed and published from the repo
# (gh release edit <tag> --draft=false). Asset-name contracts (do not break):
#   PDF-Scholar-Setup-<version>.exe   — universal x64+arm64 NSIS installer
#   pdf-scholar-extension.zip         — version-stable name; README's
#                                       releases/latest/download/ button
#                                       points at it (folder-wrapped for
#                                       "Load unpacked")
#   pdf-scholar-extension-store.zip   — manifest at zip ROOT, as the Chrome
#                                       Web Store / Edge Add-ons uploaders
#                                       require
#   latest.yml / latest-linux.yml     — electron-updater metadata (win/linux;
#                                       macOS has no auto-update: unsigned)
name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
      - run: npx electron-builder --publish never
      - name: Build extension zips
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          npm run build:ext
          # Load-unpacked variant: single top-level folder (mirrors scripts/pack-extension.mjs)
          stage="$(mktemp -d)"
          mkdir -p "$stage/pdf-scholar-extension"
          cp -r dist-extension/. "$stage/pdf-scholar-extension/"
          (cd "$stage" && zip -qr "$GITHUB_WORKSPACE/release/pdf-scholar-extension.zip" pdf-scholar-extension)
          # Store-upload variant: manifest.json at the zip root
          (cd dist-extension && zip -qr "$GITHUB_WORKSPACE/release/pdf-scholar-extension-store.zip" .)
      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.os }}
          path: |
            release/*.exe
            release/*.dmg
            release/*.AppImage
            release/*.deb
            release/*.zip
            release/*.blockmap
            release/latest*.yml
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Create draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG='${{ github.ref_name }}'
          REPO='${{ github.repository }}'
          gh release create "$TAG" \
            --repo "$REPO" \
            --draft \
            --title "PDF Scholar $TAG" \
            --generate-notes \
            artifacts/*
          # Prepend a per-platform download table: the raw asset list is
          # cryptic to non-developers (AppImage? blockmap?), so the notes
          # lead with exactly one link per platform and wave the rest off.
          VERSION="${TAG#v}"
          BASE="https://github.com/$REPO/releases/download/$TAG"
          {
            cat <<EOF
          ## Downloads — which file do I need?

          | Platform | Download |
          |---|---|
          | **Windows** 10/11 (x64 & arm64) | [PDF-Scholar-Setup-$VERSION.exe]($BASE/PDF-Scholar-Setup-$VERSION.exe) |
          | **macOS** — Apple Silicon (M1 and newer) | [PDF-Scholar-$VERSION-arm64.dmg]($BASE/PDF-Scholar-$VERSION-arm64.dmg) |
          | **macOS** — Intel | [PDF-Scholar-$VERSION-x64.dmg]($BASE/PDF-Scholar-$VERSION-x64.dmg) |
          | **Linux** — any distribution | [PDF-Scholar-$VERSION.AppImage]($BASE/PDF-Scholar-$VERSION.AppImage) (make executable and run — no install needed) |
          | **Linux** — Debian/Ubuntu | [PDF-Scholar-$VERSION.deb]($BASE/PDF-Scholar-$VERSION.deb) |
          | **Browser extension** — Edge/Chrome | [pdf-scholar-extension.zip]($BASE/pdf-scholar-extension.zip) (unzip, then "Load unpacked" at \`edge://extensions\`) |

          <sub>The remaining files are plumbing: \`latest*.yml\` + \`.exe.blockmap\` drive the built-in auto-updater, and \`pdf-scholar-extension-store.zip\` is the store-submission variant. You never need to download them.</sub>

          EOF
            gh release view "$TAG" --repo "$REPO" --json body --jq .body
          } > /tmp/notes.md
          gh release edit "$TAG" --repo "$REPO" --notes-file /tmp/notes.md
