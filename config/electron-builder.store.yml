# Microsoft Store build: MSIX/appx packages for x64 + arm64.
# Usage: npm run dist:store  (see docs/STORE.md for the full submission guide)
#
# The identity values below come from Partner Center → Product management →
# Product identity (public identifiers, not secrets). Store ID: 9N75CPC0G9M2;
# PFN: EmilMathiasStrmHalseth.PDFScholar_9ddn91dy4x8sa.
# The package is deliberately left unsigned — the Store signs it on ingestion.
# electron-updater is auto-disabled in Store installs (process.windowsStore).
# NB: `extends` resolves relative to projectDir (the repo root), NOT this file's
# folder — so it must include the `config/` prefix (app-builder-lib load.ts:96).
extends: config/electron-builder.yml
win:
  target:
    - target: appx
      arch: [x64, arm64]
appx:
  identityName: EmilMathiasStrmHalseth.PDFScholar
  publisher: CN=F8EC3EED-1BDF-4C4C-A00B-B912F9FEB151
  publisherDisplayName: Emil Mathias Strøm Halseth
  applicationId: PDFScholar
  displayName: PDF Scholar
  backgroundColor: '#1c1c1e'
  artifactName: PDF-Scholar-${version}-${arch}.${ext}
