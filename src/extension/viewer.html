<!doctype html>
<html lang="no">
  <head>
    <meta charset="UTF-8" />
    <title>PDF Scholar</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      html,
      body,
      #root {
        height: 100%;
        margin: 0;
      }
    </style>
  </head>
  <!-- spellcheck off app-wide (inherited attribute) — parity with the desktop
       index.html; users write in many languages, so per-word underlines are noise. -->
  <body spellcheck="false">
    <div id="root"></div>
    <script type="module" src="../renderer/src/extension-main.tsx"></script>
  </body>
</html>
