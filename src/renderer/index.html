       red squiggles in EVERY text field (composer, freetext annotations, notes,
       search …) at once. Users write in many languages, so per-word "misspell"
       underlines are just noise here. -->

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
